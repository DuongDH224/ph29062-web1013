<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form>
        <div class="from-group">
            <label for="">Họ và tên:</label> <br>
            <input type="text" tabindex="1" class="from-control">
        </div>
        <div class="from-group">
            <label for="">Quốc tịch:</label> <br>
            <input type="text" value="Việt Nam" readonly>
        </div>
        <div class="from-group">
            <label for="">Ghi chú:</label> <br>
            <textarea name="" class="from-control" cols="30" rows="3" tabindex="2"></textarea>
        </div>
        <hr>
        <div>
            <button tabindex="3" class="from-button">Thêm</button>
            <button tabindex="4" class="from-button">Sửa</button>
            <button disabled type="" class="from-button">Xóa</button>
        </div>

    </form>
    
</body>
</html>
