<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="from-name">
        <label for="">Họ và tên:</label> <br>
        <input type="text" class="from-control">
    </div>
    <div class="from-gender">
        <fieldset>
            <legend>Giới tính:</legend>
            <input type="radio" name="gender" checked> <label for="">Nam</label>
            <input type="radio" name="gender"> <label for="">Nữ</label>
        </fieldset>
    </div>
    <div class="from-date">
        <label for="">Ngày sinh:</label> <br>
        <input type="date" class="from-control">
    </div>
    <div class="from-point">
        <label for="">Điểm:</label> <br>
        <input type="number" min="0" max="10" step="0.25" class="from-control">
    </div>
    <div class="from-occupation">
        <label for="">Nghề nghiệp:</label> <br>
        <input list="browers" class="from-control"> 
        <datalist id="browers">
            <option value="Kĩ sư"></option>
            <option value="Bác sĩ"></option>
            <option value="Công nhân"></option>
            <option value="Giáo viên"></option>
            <option value="Công an"></option>
        </datalist>
    </div>
    <div class="from-favorite">
        <fieldset>
            <legend>Sở thích:</legend>
            <input type="checkbox" name="favorite" checked> <label for="">Thể thao</label>
            <input type="checkbox" name="favorite"> <label for="">Du lịch</label>
            <input type="checkbox" name="favorite"> <label for="">Âm nhạc</label>
            <input type="checkbox" name="favorite"> <label for="">Ẩm thực</label>
        </fieldset>
    </div>
    <div class="from-note">
        <label for="">Ghi chú:</label> <br>
        <textarea name="" id="" cols="30" rows="3" class="from-control"></textarea>
    </div>
    <div class="from-button">
        <button>Đăng kí</button>
        <button>Nhập lại</button>
    </div>
</body>
</html>
