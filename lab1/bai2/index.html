<!DOCTYPE html>
<html>
    <head>
        <title>FPT-Polytechnic</title>
        <!-- charset là cho trang web sử dụng tiếng việt -->
        <meta charset="utf-8">
    </head>
    <body>
        <!-- div là 1 thẻ bao bọc vô hình -->
        <!-- align là để căn các yếu tố -->
        <!-- center là để căn vào trung tâm -->   
        <div align="center">
            <!-- h1 là tiêu đề -->
            <h1>ALBUM ẢNH</h1>
            <!-- hr là đường kẻ ngang -->
            <hr>
            <!-- img là thẻ ảnh -->
            <!-- src là nguồn ảnh -->
            <!-- alt là dòng chữ xuất hiện thay thế ảnh khi ảnh bị lỗi  -->
            <!-- width là css chiều rộng cho ảnh -->
            <!-- height là css chiều cao cho ảnh -->
            <img src="anhlab1.2/anh1.png" alt="Ảnh Yasuo" width=150px" height="150px">
            <img src="anhlab1.2/anh2.png" alt="Ảnh Anime nữ" width="150px" height="150px">
            <img src="anhlab1.2/anh3.png" alt="Ảnh Luffy" width="150px" height="150px">
            <img src="anhlab1.2/anh4.jfif" alt="Ảnh Sanji" width="150px" height="150px">
            <hr>
            <img src="anhlab1.2/anh5.png" alt="Ảnh Yamato" width="150px" height="150px">
            <img src="anhlab1.2/anh6.png" alt="Ảnh Zoro" width="150px" height="150px">
            <img src="anhlab1.2/anh7.png" alt="Ảnh Cona" width="150px" height="150px">
            <img src="anhlab1.2/anh8.png" alt="Ảnh Naruto" width="150px" height="150px">
        </div>
       
    </body>
</html>
